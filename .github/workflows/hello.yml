name: Hello
on: workflow_dispatch
jobs:
  say-hi:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello, GitHub Actions!"

  say-bye: # Nowy job
    runs-on: ubuntu-latest
    needs: say-hi # Wykona się TYLKO po sukcesie joba 'say-hi'
    steps:
      - run: echo "Goodbye after successful 'say-hi'!"
